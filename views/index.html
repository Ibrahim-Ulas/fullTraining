<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP POST - Yeni Makale Ekle</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            font-family: sans-serif;
        }
        .form-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            width: 400px;
        }
        h2{
            margin-top: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        h3 {
            margin-top: 0;
            color: #2d3436;
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 14px;
            color: #636e72;
            font-weight: bold;
        }
        input, textarea {
            padding: 12px;
            border: 1px solid #dfe6e9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            font-family: sans-serif;
        }
        input:focus, textarea:focus {
            border-color: #6c5ce7;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            padding: 12px;
            background-color: #6c5ce7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #5b4bc4;
        }
        button:disabled {
            background-color: #b2bec3;
            cursor: not-allowed;
        }
        .view-btn {
            background-color: #2563eb; /* Modern mavi tonu (Tailwind Blue 600) */
            color: #ffffff; /* Beyaz yazı rengi */
            font-family: sans-serif;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border: none;
            border-radius: 6px; /* Hafif yuvarlatılmış köşeler */
            cursor: pointer;
            transition: all 0.2s ease-in-out; /* Geçiş efektlerinin yumuşak olması için */
            outline: none;
        }

    /* Fareyle üzerine gelindiğinde (Hover efekti) */
        .view-btn:hover {
            background-color: #1d4ed8; /* Rengi biraz koyulaştırıyoruz */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); /* Hafif gölge */
        }

    /* Butona tıklandığı an (Active efekti) */
        .view-btn:active {
            transform: scale(0.95); /* Buton içe doğru hafifçe çöker (Tıklama hissi) */
            background-color: #1e40af;
        }
        .resultContainer {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }
    </style>
</head>
<body>
    <div id="app" style="display: none;">
        <div id="form-card" class="form-card" >
            <h3>Yeni Makale Yayınla</h3>
            
            <div class="form-group">
                <div class="input-wrapper">
                    <label for="postTitle">Makale Başlığı</label>
                    <input type="text" id="postTitle" placeholder="Başlık girin...">
                </div>
                
                <div class="input-wrapper">
                    <label for="postBody">Makale İçeriği</label>
                    <textarea id="postBody" placeholder="İçerik yazın..."></textarea>
                </div>
                
                <button id="submitBtn" type="button">Yayınla</button>
                <button id="updateBtn" type="button">Güncelle</button>
                <button id="deleteBtn" type="button">Sil</button>
                <button id="logout" type="button" style="background-color: red;">Çıkış Yap</button>
            </div>

            <div class="resultContainer success" id="resultContainer"></div>
            <div class="resultContainer error" id="errorMsg"></div>
        </div>

        <div id="blogDiv">
            <h2>Bloglarınız</h2>
            <ul id="blogList"></ul>
        </div>
    </div>

    <script type="module" src="./index.js"></script>
</body>
</html>
