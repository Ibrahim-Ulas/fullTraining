<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP POST - Yeni Makale Ekle</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            font-family: sans-serif;
        }
        .form-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            width: 400px;
        }
        h3 {
            margin-top: 0;
            color: #2d3436;
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 14px;
            color: #636e72;
            font-weight: bold;
        }
        input, textarea {
            padding: 12px;
            border: 1px solid #dfe6e9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            font-family: sans-serif;
        }
        input:focus, textarea:focus {
            border-color: #6c5ce7;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            padding: 12px;
            background-color: #6c5ce7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #5b4bc4;
        }
        button:disabled {
            background-color: #b2bec3;
            cursor: not-allowed;
        }
        .view-btn {
            background-color: #2563eb; /* Modern mavi tonu (Tailwind Blue 600) */
            color: #ffffff; /* Beyaz yazı rengi */
            font-family: sans-serif;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border: none;
            border-radius: 6px; /* Hafif yuvarlatılmış köşeler */
            cursor: pointer;
            transition: all 0.2s ease-in-out; /* Geçiş efektlerinin yumuşak olması için */
            outline: none;
        }

    /* Fareyle üzerine gelindiğinde (Hover efekti) */
        .view-btn:hover {
            background-color: #1d4ed8; /* Rengi biraz koyulaştırıyoruz */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); /* Hafif gölge */
        }

    /* Butona tıklandığı an (Active efekti) */
        .view-btn:active {
            transform: scale(0.95); /* Buton içe doğru hafifçe çöker (Tıklama hissi) */
            background-color: #1e40af;
        }
        .resultContainer {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }
    </style>
</head>
<body>

    <div id="form-card" class="form-card">
        <h3>Yeni Makale Yayınla</h3>
        
        <div class="form-group">
            <div class="input-wrapper">
                <label for="postTitle">Makale Başlığı</label>
                <input type="text" id="postTitle" placeholder="Başlık girin...">
            </div>
            
            <div class="input-wrapper">
                <label for="postBody">Makale İçeriği</label>
                <textarea id="postBody" placeholder="İçerik yazın..."></textarea>
            </div>
            
            <button id="submitBtn" type="button">Yayınla</button>
            <button id="updateBtn" type="button">Güncelle</button>
            <button id="deleteBtn" type="button">Sil</button>
        </div>

        <div class="resultContainer success" id="resultContainer"></div>
        <div class="resultContainer error" id="errorMsg"></div>
    </div>

    <div id="blogDiv">
        <ul id="blogList"></ul>
    </div>

    <script>
        // DOM Elementleri
        const postTitle = document.getElementById('postTitle');
        const postBody = document.getElementById('postBody');
        const submitBtn = document.getElementById('submitBtn');
        const updateBtn = document.getElementById('updateBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const resultContainer = document.getElementById('resultContainer');
        const errorMsg = document.getElementById('errorMsg');
        const blogList = document.getElementById('blogList')
        const cardDiv = document.getElementById('form-card')

        // ASENKRON POST MANTIĞINI BURAYA YAZACAKSIN
        document.addEventListener('DOMContentLoaded', async () => {
            await getBlogs()
        })

        async function addBlog() {
            if (postBody.value === "" || postTitle.value === "") {
                showErrorMsg();
                return;
            }
            hideResultAndErrorMessage();
            changeButtonDisabled(true)
            submitBtn.textContent = "Yayınlanıyor..."
            try {
                const data = await request("http://127.0.0.1:8000/blog-olustur", "POST", {title: postTitle.value, body: postBody.value});
                clearInputs()
                showResultContainer("Makale Başarıyle Yüklendi!")
            } catch (error) {
                console.error(error);
            } finally {
                submitBtn.textContent = "Yayınla";
                changeButtonDisabled(false);
            }
        }

        async function updateBlog(id) {
           if (postBody.value === "" || postTitle.value === "") {
                showErrorMsg()
                return;
           }
            hideResultAndErrorMessage();
            changeButtonDisabled(true)
            updateBtn.textContent = "Güncelleniyor...";
           try {
                const data = await request(`http://127.0.0.1:8000/blog-guncelle?post_id=${id}`, "PUT", { title: postTitle.value, body: postBody.value});
                clearInputs()
                showResultContainer("Makale Başarıyla Güncellendi!")
                
           } catch (error) {
                console.error(error);
           } finally {
                updateBtn.textContent = "Güncelle";
                changeButtonDisabled(false);
           }
        }

        async function deleteBlog(id) {
            deleteBtn.textContent = "Siliniyor...";
            try {
                const data = await request(`http://127.0.0.1:8000/blog-sil?post_id=${id}`, "DELETE", {id: 10});
                clearInputs();
                showResultContainer("Makale başarıyla silindi!");
            } catch (error) {
                console.error(error);
            } finally {
                deleteBtn.textContent = "Sil";
                changeButtonDisabled(false);
            }
        }

        async function getBlogs() {
            blogList.innerHTML = ""
            try {
                const data = await request("http://127.0.0.1:8000/blog-tumugoruntule", "GET");
                console.log(data)
                for (const blog of data) {
                    const listItem = document.createElement("li")
                    const listSpan = document.createElement("span")
                    const selectButton = document.createElement("button")
                    listSpan.textContent = blog.title
                    selectButton.dataset.id = blog.id
                    selectButton.className = "view-btn"
                    selectButton.textContent = "Blog Seç"
                    listItem.appendChild(listSpan)
                    listItem.appendChild(selectButton)
                    blogList.appendChild(listItem)
                }
            } catch (error) {
                console.error(error)
            } finally{
                changeButtonDisabled(false)
            }
        }

        async function getSingleBlog(id) {
            try {
                const data = await request(`http://127.0.0.1:8000/blog-goruntule?post_id=${id}`, "GET");
                postTitle.value = data.title
                postBody.value = data.body
                updateBtn.dataset.id = id
                deleteBtn.dataset.id = id
                console.log(data)
            } catch (error) {
                console.error(error)
            } finally {
                changeButtonDisabled(false)
            }
        }

        function changeButtonDisabled(bool) {
            updateBtn.disabled = bool;
            submitBtn.disabled = bool
            deleteBtn.disabled = bool;
        }

        function hideResultAndErrorMessage() {
            errorMsg.style.display = "none";
            resultContainer.style.display = "none";
        }

        function showResultContainer(message) {
            resultContainer.style.display = "block";
            resultContainer.textContent = message;
            errorMsg.style.display = "none"
        }

        function showErrorMsg() {
            resultContainer.style.display = "none";
            errorMsg.style.display = "block";
            errorMsg.textContent = "Tüm alanları doldurunuz.";
        }

        function clearInputs() {
            postBody.value = ""
            postTitle.value = ""
        }

        cardDiv.addEventListener('click', async (e) => {
            const id = e.target.dataset.id
            if (e.target === submitBtn) {
                await addBlog()
                getBlogs()
            }
            if (e.target === updateBtn) {
                await updateBlog(id)
                getBlogs()
            }
            if (e.target === deleteBtn) {
                await deleteBlog(id)
                getBlogs()
            }
        })

        blogList.addEventListener('click', (e) => {
            if (e.target.classList.contains('view-btn')) {
                const blogId = event.target.dataset.id
                getSingleBlog(blogId);
            }
        })

        async function request(url, method, bodyData = null) {
            const options = {
                method: method,
                headers: {
                    "Content-Type": "application/json"
                },
                body: bodyData ? JSON.stringify(bodyData) : null
            }
            try {
                const response = await fetch(url, options);

                if(!response.ok) {
                    throw new Error('API responded with: ' + response.status);
                }
                const data = await response.json();
                console.log(data)
                return data
            } catch (error) {
                console.error(`Network or connection error: ${error}`)
            }
        }
    </script>
</body>
</html>
